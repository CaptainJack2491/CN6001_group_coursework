<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1000" height="500" viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1000" height="500" fill="#ffffff" />
  
  <!-- Main Title -->
  <text x="500" y="30" font-family="Arial, sans-serif" font-size="22" font-weight="bold" text-anchor="middle" fill="#1a1a2e">Technical Architectural Evolution: Hybrid AOA/SOA vs. Cloud-Native Dual-SOA</text>

  <!-- Section: Discarded Model -->
  <rect x="20" y="60" width="350" height="400" rx="10" fill="#fcfcfc" stroke="#6c757d" stroke-width="1" stroke-dasharray="4,2" />
  <text x="195" y="85" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#6c757d">Discarded Concept (Hybrid AOA/SOA)</text>
  
  <!-- Web Component -->
  <rect x="60" y="110" width="270" height="60" rx="5" fill="#ffffff" stroke="#adb5bd" stroke-width="1.5" />
  <text x="195" y="130" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#495057">Patient Portal (Web)</text>
  <text x="195" y="150" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#6c757d">Service-Oriented (3-Tier via REST)</text>

  <!-- Desktop Component -->
  <rect x="60" y="200" width="270" height="60" rx="5" fill="#ffffff" stroke="#e94560" stroke-width="2" />
  <text x="195" y="220" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a2e">Staff Interface (Desktop/tkinter)</text>
  <text x="195" y="240" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#e94560">Application-Oriented (2-Tier DB Coupling)</text>

  <!-- Connectivity Gap / Flaws -->
  <rect x="75" y="290" width="240" height="50" rx="5" fill="#f8d7da" stroke="#f5c6cb" stroke-width="1" />
  <text x="195" y="310" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#721c24">Architectural Anti-Patterns:</text>
  <text x="195" y="328" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#721c24">Duplicated Logic • Direct DB Access • OS Lock-in</text>

  <!-- Section: Implemented Model (Technical) -->
  <rect x="420" y="60" width="560" height="400" rx="10" fill="#f0f9fa" stroke="#01696f" stroke-width="1.5" />
  <text x="700" y="85" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#01696f">Technical Implementation (Cloud-Native Dual-SOA)</text>

  <!-- Load Balancer Tier -->
  <rect x="550" y="110" width="300" height="40" rx="20" fill="#1a1a2e" stroke="#0f3460" stroke-width="1" />
  <text x="700" y="135" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#ffffff">AWS Application Load Balancer (ALB)</text>
  
  <!-- Traffic Lines -->
  <line x1="500" y1="130" x2="550" y2="130" stroke="#01696f" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="460" y="132" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#1a1a2e">HTTPS/TLS 1.3</text>

  <!-- ASG Group -->
  <rect x="450" y="170" width="500" height="150" rx="10" fill="#ffffff" stroke="#008f97" stroke-dasharray="5,3" />
  <text x="700" y="185" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#008f97">AWS Elastic Beanstalk (Auto-Scaling Group)</text>

  <!-- Instances -->
  <rect x="480" y="200" width="200" height="100" rx="5" fill="#e7f3f4" stroke="#01696f" stroke-width="2" />
  <text x="580" y="225" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a2e">Patient Portal (Web Tier)</text>
  <text x="580" y="245" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#495057">Stateless Flask Instance</text>
  <text x="580" y="280" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#01696f">Unified Authentication (RBAC)</text>

  <rect x="720" y="200" width="200" height="100" rx="5" fill="#e7f3f4" stroke="#01696f" stroke-width="2" />
  <text x="820" y="225" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a2e">Staff Portal (Web Tier)</text>
  <text x="820" y="245" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#495057">Stateless Flask Instance</text>
  <text x="820" y="280" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#01696f">Real-time Data Fetching</text>

  <!-- Database Connectivity -->
  <path d="M700 320 L700 360" stroke="#1a1a2e" stroke-width="2" marker-end="url(#arrow)" />
  <text x="800" y="350" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a2e">SQLAlchemy ORM (3NF Schema)</text>

  <!-- Data Tier -->
  <rect x="620" y="370" width="160" height="60" rx="5" fill="#1a1a2e" />
  <text x="700" y="395" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#ffffff">AWS RDS</text>
  <text x="700" y="415" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#ffffff">PostgreSQL (Multi-AZ)</text>

  <!-- Benefits Legend -->
  <rect x="420" y="470" width="560" height="25" rx="5" fill="#1a1a2e" />
  <text x="700" y="487" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#ffffff">High Availability • Dynamic Scaling • Single API Surface • End-to-End Encryption</text>

  <!-- Marker Defs -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1a1a2e" />
    </marker>
  </defs>
</svg>
