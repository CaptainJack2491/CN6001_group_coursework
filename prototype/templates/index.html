<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CVD Clinic - Patient Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <h1>CVD Clinic Patient Portal</h1>
        <a href="/staff" style="color: white; font-size: 0.9rem;">Staff Login</a>
    </nav>

    <div class="container grid-2">
        <div class="card">
            <h2>Patient Login</h2>
            {% if error %}
            <div class="error-msg">{{ error }}</div>
            {% endif %}
            <form action="/login" method="POST">
                <div class="form-group">
                    <label>Patient ID</label>
                    <input type="text" name="patient_id" placeholder="P1001" required>
                </div>
                <div class="form-group">
                    <label>Passphrase</label>
                    <input type="password" name="password" required>
                </div>
                <button type="submit">Access My Dashboard</button>
            </form>
        </div>

        <div class="card">
            <h2>New Patient Registration</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label>Preferred Patient ID</label>
                    <input type="text" id="reg_id" required>
                </div>
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" id="reg_fname" required>
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" id="reg_lname" required>
                </div>
                <div class="form-group">
                    <label>Date of Birth</label>
                    <input type="date" id="reg_dob" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="reg_email" required>
                </div>
                <div class="form-group">
                    <label>Set Passphrase</label>
                    <input type="password" id="reg_pass" required>
                </div>
                <button type="submit">Register Account</button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                patientID: document.getElementById('reg_id').value,
                firstName: document.getElementById('reg_fname').value,
                lastName: document.getElementById('reg_lname').value,
                dateOfBirth: document.getElementById('reg_dob').value,
                email: document.getElementById('reg_email').value,
                password: document.getElementById('reg_pass').value
            };
            
            try {
                const response = await fetch('/api/patient/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                if(response.ok) {
                    alert('Registration Successful! You can now login.');
                    location.reload();
                } else {
                    const result = await response.json();
                    alert('Error: ' + result.error);
                }
            } catch(error) {
                alert('Network Error');
            }
        });
    </script>
</body>
</html>
